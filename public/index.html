<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mapa de Lugares</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>

      /* estilos del menú */
      #menu {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 9999;
        background: rgba(255, 255, 255, 0.8); /* Fondo semi-transparente para verlo */
        padding: 10px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #menu button {
        display: block;
        margin: 5px;
        padding: 10px;
        border: none;
        background: #333;
        color: white;
        cursor: pointer;
        border-radius: 8px;
      }

      #menu button:hover {
        background: #555;
      }

      #map {
        height: 100vh;
        width: 100%;
        z-index: 1;
      }
    </style>
  </head>

  <body>
    <div id="menu">
      <button onclick="cargarLugares('Gastronomica')">🍽️ Gastronomía</button>
      <button onclick="cargarLugares('Cultura')">🎭 Cultura</button>
      <button onclick="cargarLugares('Night')">🌙 Night</button>
      <button onclick="cargarLugares('Familiar')">🌳 Familiar</button>
      <button onclick="cargarLugares('Entretenimiento')"> Entretenimiento</button>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="app.js"></script>
  </body>
</html>
